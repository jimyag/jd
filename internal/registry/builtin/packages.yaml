packages:
  - name: jd
    description: jimyag-download — install binaries from GitHub Releases
    doc_url: "https://github.com/jimyag/jd#installation"
    version_from:
      type: github
      repo: jimyag/jd
      tag_prefix: "v"
    url_template: "https://github.com/jimyag/jd/releases/download/{{.Version}}/jd_{{.VersionNoV}}_{{.OS}}_{{.Arch}}"
    mode: file
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: go
    description: Go programming language toolchain
    doc_url: "https://go.dev/doc/install"
    version_from:
      type: godev
    url_template: "https://go.dev/dl/{{.Version}}.{{.OS}}-{{.Arch}}.tar.gz"
    inner_path: "go"
    install_dir: "~/.go/{{.Version}}"
    symlink: "~/.go/goroot"
    version_prefix: "go"
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: tailscale
    description: VPN mesh network
    doc_url: "https://tailscale.com/download/linux"
    command: "bash -c \"$(curl -fsSL https://tailscale.com/install.sh)\""
    mode: command
    supported_platforms:
      - linux

  - name: kubectl
    description: Kubernetes CLI
    doc_url: "https://kubernetes.io/docs/tasks/tools/"
    version_from:
      type: github
      repo: kubernetes/kubernetes
      tag_prefix: "v"
    url_template: "https://dl.k8s.io/release/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl"
    mode: file
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: nexttrace
    description: Visual traceroute tool
    doc_url: "https://github.com/nxtrace/NTrace-core#readme"
    version_from:
      type: github
      repo: nxtrace/NTrace-core
      tag_prefix: "v"
    url_template: "https://github.com/nxtrace/NTrace-core/releases/download/{{.Version}}/nexttrace_{{.OS}}_{{.Arch}}"
    mode: file
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: age
    description: Simple file encryption tool
    doc_url: "https://github.com/FiloSottile/age#installation"
    version_from:
      type: github
      repo: FiloSottile/age
      tag_prefix: "v"
    url_template: "https://github.com/FiloSottile/age/releases/download/{{.Version}}/age-{{.Version}}-{{.OS}}-{{.Arch}}.tar.gz"
    inner_path: "age/age"
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: virtctl
    description: KubeVirt VM management CLI
    doc_url: "https://kubevirt.io/user-guide/user_workloads/virtctl_client_tool/"
    version_from:
      type: github
      repo: kubevirt/kubevirt
      tag_prefix: "v"
    url_template: "https://github.com/kubevirt/kubevirt/releases/download/{{.Version}}/virtctl-{{.Version}}-{{.OS}}-{{.Arch}}"
    mode: file
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: helm
    description: Kubernetes package manager
    doc_url: "https://helm.sh/docs/intro/install/"
    version_from:
      type: github
      repo: helm/helm
      tag_prefix: "v"
    url_template: "https://get.helm.sh/helm-{{.Version}}-{{.OS}}-{{.Arch}}.tar.gz"
    inner_path: "{{.OS}}-{{.Arch}}/helm"
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: nettrace
    description: Linux network tracing tool (OpenCloudOS)
    doc_url: "https://github.com/OpenCloudOS/nettrace#readme"
    version_from:
      type: github
      repo: OpenCloudOS/nettrace
      tag_prefix: "v"
    url_template: "https://github.com/OpenCloudOS/nettrace/releases/download/{{.Version}}/nettrace-{{.VersionNoV}}-1.tl3.{{.Arch}}.tar.bz2"
    inner_path: "nettrace-{{.VersionNoV}}-1.tl3.{{.Arch}}/nettrace"
    supported_platforms:
      - linux
    arch_map:
      amd64: x86_64
      arm64: aarch64

  - name: gh
    description: GitHub CLI
    doc_url: "https://github.com/cli/cli/releases/latest"
    version_from:
      type: github
      repo: cli/cli
      tag_prefix: "v"
    url_template: "https://github.com/cli/cli/releases/download/{{.Version}}/gh_{{.VersionNoV}}_{{.OS}}_{{.Arch}}{{if eq .OS \"macOS\"}}.zip{{else}}.tar.gz{{end}}"
    inner_path: "gh_{{.VersionNoV}}_{{.OS}}_{{.Arch}}/bin/gh"
    os_map:
      darwin: macOS
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: dive
    description: Docker image layer explorer
    doc_url: "https://github.com/wagoodman/dive#installation"
    version_from:
      type: github
      repo: wagoodman/dive
      tag_prefix: "v"
    url_template: "https://github.com/wagoodman/dive/releases/download/{{.Version}}/dive_{{.VersionNoV}}_{{.OS}}_{{.Arch}}.tar.gz"
    inner_path: "dive"
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: task
    description: Task runner / build tool (Taskfile)
    doc_url: "https://taskfile.dev/installation/"
    command: "bash -c \"$(curl -fsSL https://taskfile.dev/install.sh)\""
    mode: command
    supported_platforms:
      - linux
      - darwin

  - name: chezmoi
    description: Dotfiles manager
    doc_url: "https://www.chezmoi.io/install/"
    version_from:
      type: github
      repo: twpayne/chezmoi
      tag_prefix: "v"
    url_template: "https://github.com/twpayne/chezmoi/releases/download/{{.Version}}/chezmoi_{{.VersionNoV}}_{{.OS}}_{{.Arch}}.tar.gz"
    inner_path: "chezmoi"
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: hugo
    description: Static site generator (extended edition)
    doc_url: "https://gohugo.io/installation/"
    version_from:
      type: github
      repo: gohugoio/hugo
      tag_prefix: "v"
    url_template: "https://github.com/gohugoio/hugo/releases/download/{{.Version}}/hugo_extended_{{.VersionNoV}}_linux-{{.Arch}}.tar.gz"
    inner_path: "hugo"
    supported_platforms:
      - linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: golangci-lint
    description: Go linters aggregator
    doc_url: "https://golangci-lint.run/welcome/install/"
    command: "bash -c \"$(curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh)\" -- -b $(go env GOPATH)/bin"
    mode: command
    supported_platforms:
      - linux
      - darwin

  - name: claude-code
    description: Claude Code CLI by Anthropic
    doc_url: "https://docs.anthropic.com/en/docs/claude-code/quickstart"
    command: "bash -c \"$(curl -fsSL https://claude.ai/install.sh)\""
    mode: command
    supported_platforms:
      - linux
      - darwin

  - name: codex
    description: OpenAI Codex CLI
    doc_url: "https://github.com/openai/codex/blob/main/README.md"
    version_from:
      type: github
      repo: openai/codex
      tag_prefix: "rust-v"
    url_template: "https://github.com/openai/codex/releases/download/{{.Version}}/codex-{{.Arch}}-{{.OS}}.tar.gz"
    inner_path: "codex-{{.Arch}}-{{.OS}}"
    os_map:
      darwin: apple-darwin
      linux: unknown-linux-gnu
    arch_map:
      amd64: x86_64
      arm64: aarch64

  - name: gemini-cli
    description: Google Gemini CLI
    methods:
      - type: npm
        priority: 100
        doc_url: "https://github.com/google-gemini/gemini-cli/blob/main/README.md"
        package: "@google/gemini-cli"
        supported_platforms:
          - linux
          - darwin

  - name: cursor
    description: Cursor AI code editor
    doc_url: "https://cursor.com/download"
    command: "bash -c \"$(curl -fsSL https://cursor.com/install)\""
    mode: command
    supported_platforms:
      - linux
      - darwin

  - name: frpc
    description: frp client — fast reverse proxy
    doc_url: "https://github.com/fatedier/frp#readme"
    version_from:
      type: github
      repo: fatedier/frp
      tag_prefix: "v"
    url_template: "https://github.com/fatedier/frp/releases/download/{{.Version}}/frp_{{.VersionNoV}}_{{.OS}}_{{.Arch}}.tar.gz"
    inner_path: "frp_{{.VersionNoV}}_{{.OS}}_{{.Arch}}/frpc"
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: frps
    description: frp server — fast reverse proxy
    doc_url: "https://github.com/fatedier/frp#readme"
    version_from:
      type: github
      repo: fatedier/frp
      tag_prefix: "v"
    url_template: "https://github.com/fatedier/frp/releases/download/{{.Version}}/frp_{{.VersionNoV}}_{{.OS}}_{{.Arch}}.tar.gz"
    inner_path: "frp_{{.VersionNoV}}_{{.OS}}_{{.Arch}}/frps"
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: mihomo
    description: Rule-based proxy tunnel (Clash Meta)
    doc_url: "https://wiki.metacubex.one/en/startup/"
    version_from:
      type: github
      repo: MetaCubeX/mihomo
      tag_prefix: "v"
    url_template: "https://github.com/MetaCubeX/mihomo/releases/download/{{.Version}}/mihomo-{{.OS}}-{{.Arch}}-{{.Version}}.gz"
    mode: file
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: gohttpserver
    description: HTTP file server with web UI
    doc_url: "https://github.com/codeskyblue/gohttpserver#readme"
    version_from:
      type: github
      repo: codeskyblue/gohttpserver
      tag_prefix: ""
    url_template: "https://github.com/codeskyblue/gohttpserver/releases/download/{{.VersionNoV}}/gohttpserver_{{.VersionNoV}}_{{.OS}}_{{.Arch}}.tar.gz"
    inner_path: "gohttpserver"
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64
