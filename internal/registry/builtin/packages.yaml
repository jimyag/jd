packages:
  - name: jd
    description: jimyag-download — install binaries from GitHub Releases
    version_from:
      type: github
      repo: jimyag/jd
      tag_prefix: "v"
    url_template: "https://github.com/jimyag/jd/releases/download/{{.Version}}/jd_{{.VersionNoV}}_{{.OS}}_{{.Arch}}"
    mode: file
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: go
    description: Go programming language toolchain
    version_from:
      type: godev
    url_template: "https://go.dev/dl/{{.Version}}.{{.OS}}-{{.Arch}}.tar.gz"
    inner_path: "go"
    install_dir: "~/.go/{{.Version}}"
    symlink: "~/.go/goroot"
    version_prefix: "go"
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: tailscale
    description: VPN mesh network
    command: "curl -fsSL https://tailscale.com/install.sh | sh"
    mode: command
    supported_platforms:
      - linux

  - name: kubectl
    description: Kubernetes CLI
    version_from:
      type: github
      repo: kubernetes/kubernetes
      tag_prefix: "v"
    url_template: "https://dl.k8s.io/release/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl"
    mode: file
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: nexttrace
    description: Visual traceroute tool
    version_from:
      type: github
      repo: nxtrace/NTrace-core
      tag_prefix: "v"
    url_template: "https://github.com/nxtrace/NTrace-core/releases/download/{{.Version}}/nexttrace_{{.OS}}_{{.Arch}}"
    mode: file
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: age
    description: Simple file encryption tool
    version_from:
      type: github
      repo: FiloSottile/age
      tag_prefix: "v"
    url_template: "https://github.com/FiloSottile/age/releases/download/{{.Version}}/age-{{.Version}}-{{.OS}}-{{.Arch}}.tar.gz"
    inner_path: "age/age"
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: virtctl
    description: KubeVirt VM management CLI
    version_from:
      type: github
      repo: kubevirt/kubevirt
      tag_prefix: "v"
    url_template: "https://github.com/kubevirt/kubevirt/releases/download/{{.Version}}/virtctl-{{.Version}}-{{.OS}}-{{.Arch}}"
    mode: file
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: helm
    description: Kubernetes package manager
    version_from:
      type: github
      repo: helm/helm
      tag_prefix: "v"
    url_template: "https://get.helm.sh/helm-{{.Version}}-{{.OS}}-{{.Arch}}.tar.gz"
    inner_path: "{{.OS}}-{{.Arch}}/helm"
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: nettrace
    description: Linux network tracing tool (OpenCloudOS)
    version_from:
      type: github
      repo: OpenCloudOS/nettrace
      tag_prefix: "v"
    url_template: "https://github.com/OpenCloudOS/nettrace/releases/download/{{.Version}}/nettrace-{{.VersionNoV}}-1.tl3.{{.Arch}}.tar.bz2"
    inner_path: "usr/bin/nettrace"
    supported_platforms:
      - linux
    arch_map:
      amd64: x86_64
      arm64: aarch64

  - name: gh
    description: GitHub CLI
    version_from:
      type: github
      repo: cli/cli
      tag_prefix: "v"
    url_template: "https://github.com/cli/cli/releases/download/{{.Version}}/gh_{{.VersionNoV}}_{{.OS}}_{{.Arch}}{{if eq .OS \"macOS\"}}.zip{{else}}.tar.gz{{end}}"
    inner_path: "gh_{{.VersionNoV}}_{{.OS}}_{{.Arch}}/bin/gh"
    os_map:
      darwin: macOS
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: dive
    description: Docker image layer explorer
    version_from:
      type: github
      repo: wagoodman/dive
      tag_prefix: "v"
    url_template: "https://github.com/wagoodman/dive/releases/download/{{.Version}}/dive_{{.VersionNoV}}_{{.OS}}_{{.Arch}}.tar.gz"
    inner_path: "dive"
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: task
    description: Task runner / build tool (Taskfile)
    command: "sh -c \"$(curl -fsSL https://taskfile.dev/install.sh)\""
    mode: command
    supported_platforms:
      - linux
      - darwin

  - name: chezmoi
    description: Dotfiles manager
    version_from:
      type: github
      repo: twpayne/chezmoi
      tag_prefix: "v"
    url_template: "https://github.com/twpayne/chezmoi/releases/download/{{.Version}}/chezmoi_{{.VersionNoV}}_{{.OS}}_{{.Arch}}.tar.gz"
    inner_path: "chezmoi"
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: hugo
    description: Static site generator (extended edition)
    version_from:
      type: github
      repo: gohugoio/hugo
      tag_prefix: "v"
    url_template: "https://github.com/gohugoio/hugo/releases/download/{{.Version}}/hugo_extended_{{.VersionNoV}}_linux-{{.Arch}}.tar.gz"
    inner_path: "hugo"
    supported_platforms:
      - linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: golangci-lint
    description: Go linters aggregator
    command: "curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin"
    mode: command
    supported_platforms:
      - linux
      - darwin

  - name: claude-code
    description: Claude Code CLI by Anthropic
    command: "curl -fsSL https://claude.ai/install.sh | sh"
    mode: command
    supported_platforms:
      - linux
      - darwin

  - name: codex
    description: OpenAI Codex CLI
    command: "npm install -g @openai/codex"
    mode: command
    supported_platforms:
      - linux
      - darwin

  - name: gemini-cli
    description: Google Gemini CLI
    command: "npm install -g @google/gemini-cli"
    mode: command
    supported_platforms:
      - linux
      - darwin

  - name: cursor
    description: Cursor AI code editor
    command: "curl -fsSL https://cursor.com/install | sh"
    mode: command
    supported_platforms:
      - linux
      - darwin

  - name: frpc
    description: frp client — fast reverse proxy
    version_from:
      type: github
      repo: fatedier/frp
      tag_prefix: "v"
    url_template: "https://github.com/fatedier/frp/releases/download/{{.Version}}/frp_{{.VersionNoV}}_{{.OS}}_{{.Arch}}.tar.gz"
    inner_path: "frp_{{.VersionNoV}}_{{.OS}}_{{.Arch}}/frpc"
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: frps
    description: frp server — fast reverse proxy
    version_from:
      type: github
      repo: fatedier/frp
      tag_prefix: "v"
    url_template: "https://github.com/fatedier/frp/releases/download/{{.Version}}/frp_{{.VersionNoV}}_{{.OS}}_{{.Arch}}.tar.gz"
    inner_path: "frp_{{.VersionNoV}}_{{.OS}}_{{.Arch}}/frps"
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: mihomo
    description: Rule-based proxy tunnel (Clash Meta)
    version_from:
      type: github
      repo: MetaCubeX/mihomo
      tag_prefix: "v"
    url_template: "https://github.com/MetaCubeX/mihomo/releases/download/{{.Version}}/mihomo-{{.OS}}-{{.Arch}}-{{.Version}}.gz"
    mode: file
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64

  - name: gohttpserver
    description: HTTP file server with web UI
    version_from:
      type: github
      repo: codeskyblue/gohttpserver
      tag_prefix: ""
    url_template: "https://github.com/codeskyblue/gohttpserver/releases/download/{{.VersionNoV}}/gohttpserver_{{.VersionNoV}}_{{.OS}}_{{.Arch}}.tar.gz"
    inner_path: "gohttpserver"
    os_map:
      darwin: darwin
      linux: linux
    arch_map:
      amd64: amd64
      arm64: arm64
